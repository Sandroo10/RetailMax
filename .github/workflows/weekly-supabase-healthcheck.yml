name: Supabase Healthcheck

on:
  schedule:
    # Daily at 05:15 UTC
    - cron: "15 5 * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Supabase RPC healthcheck
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HEALTHCHECK_RPC: healthcheck_ping
        run: |
          set -euo pipefail

          fail() {
            local reason="$1"
            echo "Healthcheck failed: ${reason}"
            {
              echo "## Supabase Healthcheck"
              echo "- Status: failed"
              echo "- Reason: ${reason}"
              echo "- Endpoint: ${healthcheck_url:-unset}"
              if [ -n "${http_status:-}" ]; then
                echo "- HTTP status: ${http_status}"
              fi
              if [ -n "${curl_exit_code:-}" ]; then
                echo "- Curl exit code: ${curl_exit_code}"
              fi
              if [ -n "${curl_error_file:-}" ] && [ -s "${curl_error_file}" ]; then
                echo "- Curl error output:"
                echo '```text'
                cat "${curl_error_file}"
                echo '```'
              fi
              if [ -n "${jq_error_file:-}" ] && [ -s "${jq_error_file}" ]; then
                echo "- JSON validation output:"
                echo '```text'
                cat "${jq_error_file}"
                echo '```'
              fi
              if [ -n "${response_file:-}" ] && [ -f "${response_file}" ]; then
                echo "- Response body:"
                echo '```json'
                cat "${response_file}"
                echo '```'
              fi
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          }

          cleanup() {
            if [ -n "${response_file:-}" ] && [ -f "${response_file}" ]; then
              rm -f "${response_file}"
            fi
            if [ -n "${curl_error_file:-}" ] && [ -f "${curl_error_file}" ]; then
              rm -f "${curl_error_file}"
            fi
            if [ -n "${jq_error_file:-}" ] && [ -f "${jq_error_file}" ]; then
              rm -f "${jq_error_file}"
            fi
          }
          trap cleanup EXIT

          supabase_api_key="${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_ANON_KEY:-}}"

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${supabase_api_key:-}" ]; then
            fail "Missing required secrets: SUPABASE_URL and either SUPABASE_ANON_KEY or SUPABASE_SERVICE_ROLE_KEY"
          fi

          healthcheck_url="${SUPABASE_URL%/}/rest/v1/rpc/${HEALTHCHECK_RPC}"
          response_file="$(mktemp)"
          curl_error_file="$(mktemp)"
          jq_error_file="$(mktemp)"
          curl_exit_code=0
          http_status="$(
            curl -sS \
              --max-time 20 \
              --retry 2 \
              --retry-delay 5 \
              -o "${response_file}" \
              -w "%{http_code}" \
              -X POST \
              -H "apikey: ${supabase_api_key}" \
              -H "Authorization: Bearer ${supabase_api_key}" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "${healthcheck_url}" \
              2>"${curl_error_file}"
          )" || curl_exit_code=$?

          if [ "${curl_exit_code}" -ne 0 ]; then
            fail "HTTP request failed"
          fi

          echo "HTTP status: ${http_status}"
          echo "Response body:"
          cat "${response_file}"

          case "${http_status}" in
            200|201|204)
              ;;
            401|403)
              fail "Unauthorized response from Supabase REST API"
              ;;
            402)
              fail "Supabase returned a plan or quota restriction"
              ;;
            404)
              fail "RPC endpoint not found; confirm healthcheck_ping exists and is exposed"
              ;;
            540)
              fail "Supabase project is paused"
              ;;
            *)
              fail "Unexpected non-2xx response"
              ;;
          esac

          if [ -s "${response_file}" ]; then
            if ! jq -e . "${response_file}" > /dev/null 2>"${jq_error_file}"; then
              fail "Response body is not valid JSON"
            fi
          fi

          {
            echo "## Supabase Healthcheck"
            echo "- Status: ok"
            echo "- Endpoint: ${healthcheck_url}"
            echo "- HTTP status: ${http_status}"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Healthcheck OK."
